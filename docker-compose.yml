services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      args:
        - DB_FILENAME=file:/app/data/db.sqlite
    restart: unless-stopped
    environment:
      - NODE_ENV=PRODUCTION
      - PORT=8080
      - DB_FILENAME=file:/app/data/db.sqlite
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
    volumes:
      - /home/andy/data:/app/data
    networks:
      - internal

  web:
  build:
    context: .
    dockerfile: apps/web/Dockerfile
    args:
      - NEXT_PUBLIC_ANALYTICS_URL=${NEXT_PUBLIC_ANALYTICS_URL}
      - NEXT_PUBLIC_ANALYTICS_UUID=${NEXT_PUBLIC_ANALYTICS_UUID}
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - INTERNAL_API_URL=http://api:8080 # tohle je runtime — OK
    depends_on:
      - api
    networks:
      - internal

networks:
  internal:
    driver: bridge
